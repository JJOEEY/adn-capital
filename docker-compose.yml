services:
  db:
    image: postgres:16-alpine
    container_name: adn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-adncapital}
      POSTGRES_USER: ${POSTGRES_USER:-adnuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /var/lib/9router/data/postgres:/var/lib/postgresql/data
    networks:
      - adn-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adnuser} -d ${POSTGRES_DB:-adncapital}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: adn-pgbouncer
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-adnuser}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-adncapital}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 500
      DEFAULT_POOL_SIZE: 25
      RESERVE_POOL_SIZE: 5
      SERVER_RESET_QUERY: DISCARD ALL
      IGNORE_STARTUP_PARAMETERS: extra_float_digits
    depends_on:
      db:
        condition: service_healthy
    networks:
      - adn-net

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adn-web
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PYTHON_BRIDGE_URL=http://fiinquant:8000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-adnuser}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-adncapital}?schema=public&pgbouncer=true
      - DIRECT_DATABASE_URL=postgresql://${POSTGRES_USER:-adnuser}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-adncapital}?schema=public
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      fiinquant:
        condition: service_started
    networks:
      - adn-net

  fiinquant:
    build:
      context: ../fiinquant-bridge
      dockerfile: Dockerfile.python
    container_name: adn-fiinquant
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    networks:
      - adn-net

  nginx:
    image: nginx:alpine
    container_name: adn-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    networks:
      - adn-net

networks:
  adn-net:
    driver: bridge
