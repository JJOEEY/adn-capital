services:
  db:
    image: postgres:16-alpine
    container_name: adn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-adncapital}
      POSTGRES_USER: ${POSTGRES_USER:-adnuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /var/lib/9router/data/postgres:/var/lib/postgresql/data
    networks:
      - adn-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adnuser} -d ${POSTGRES_DB:-adncapital}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: adn-pgbouncer
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-adnuser}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-adncapital}
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 500
      DEFAULT_POOL_SIZE: 25
      RESERVE_POOL_SIZE: 5
      SERVER_RESET_QUERY: DISCARD ALL
      IGNORE_STARTUP_PARAMETERS: extra_float_digits
    depends_on:
      db:
        condition: service_healthy
    networks:
      - adn-net

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adn-web
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PYTHON_BRIDGE_URL=http://fiinquant:8000
      - GUIDE_UPLOAD_DIR=/app/storage/guides
      - DATABASE_URL=postgresql://${POSTGRES_USER:-adnuser}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB:-adncapital}?schema=public&pgbouncer=true
      - DIRECT_DATABASE_URL=postgresql://${POSTGRES_USER:-adnuser}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-adncapital}?schema=public
    volumes:
      - ./app_data/guides:/app/storage/guides
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      fiinquant:
        condition: service_started
    networks:
      - adn-net

  fiinquant:
    build:
      context: ../fiinquant-bridge
      dockerfile: Dockerfile.python
    container_name: adn-fiinquant
    restart: unless-stopped
    env_file: .env
    environment:
      - WEBHOOK_URL=http://web:3000/api/webhooks/signals
      - BRIDGE_DIRECT_TELEGRAM_ENABLED=false
    ports:
      - "8000:8000"
    networks:
      - adn-net

  n8n:
    image: n8nio/n8n:1.92.2
    container_name: adn-n8n
    profiles:
      - automation
    restart: unless-stopped
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - GENERIC_TIMEZONE=Asia/Ho_Chi_Minh
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-}
      - N8N_RUNNERS_ENABLED=true
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-}
      - ADN_WEB_BASE_URL=${N8N_ADN_WEB_BASE_URL:-http://web:3000}
      - ADN_INTERNAL_API_KEY=${INTERNAL_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-}
    volumes:
      - ./app_data/n8n:/home/node/.n8n
      - ./docs/ops/n8n/workflows:/workflows:ro
    ports:
      - "127.0.0.1:5678:5678"
    depends_on:
      web:
        condition: service_started
    networks:
      - adn-net

  nginx:
    image: nginx:alpine
    container_name: adn-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    networks:
      - adn-net

networks:
  adn-net:
    driver: bridge
