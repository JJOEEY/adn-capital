version: "3.9"

services:
  # ── PostgreSQL Database ───────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: adn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-adncapital}
      POSTGRES_USER: ${POSTGRES_USER:-adnuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      # Persistence: dữ liệu lưu tại /var/lib/9router/data trên VPS
      - /var/lib/9router/data/postgres:/var/lib/postgresql/data
    networks:
      - adn-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adnuser} -d ${POSTGRES_DB:-adncapital}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js Web App ───────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adn-web
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - PYTHON_BRIDGE_URL=http://fiinquant:8000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      fiinquant:
        condition: service_started
    networks:
      - adn-net

  # ── FiinQuant Python Bridge ───────────────────────────────────
  fiinquant:
    build:
      context: ../fiinquant-bridge
      dockerfile: Dockerfile.python
    container_name: adn-fiinquant
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    networks:
      - adn-net


  # ── Nginx Reverse Proxy ───────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: adn-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    networks:
      - adn-net

networks:
  adn-net:
    driver: bridge
