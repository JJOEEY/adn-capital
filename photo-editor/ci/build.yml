# GitHub Actions workflow for Lumen.
#
# Lives under photo-editor/ci/ to avoid colliding with the host repo's CI. When
# this project is extracted to its own repo, move this file to
# .github/workflows/build.yml.

name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build # tsc --noEmit + vite build

  raw-core:
    # Pure-Rust RAW pipeline — no webview deps, runs anywhere.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: photo-editor
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p raw-core

  desktop:
    needs: frontend
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - name: Linux webview deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - run: npm run tauri:build
