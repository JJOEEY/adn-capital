<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#F8F7F2" />
    <title>ADN Capital</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f8f7f2;
        color: #1c2b22;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        max-width: 320px;
        text-align: center;
      }

      img {
        width: 72px;
        height: 72px;
        border-radius: 16px;
        object-fit: cover;
        box-shadow: 0 12px 28px rgba(28, 43, 34, 0.16);
      }

      h1 {
        margin: 18px 0 8px;
        font-size: 24px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: #637064;
        font-size: 14px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/logo.jpg" alt="ADN Capital" />
      <h1>ADN Capital</h1>
      <p>Loading the secure ADN mobile experience.</p>
    </main>
  </body>
</html>
