<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Mất kết nối · ADN Capital</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f8f7f2;color:#1b211c;
    display:flex;align-items:center;justify-content:center;text-align:center;
    padding:24px calc(24px + env(safe-area-inset-right,0)) calc(24px + env(safe-area-inset-bottom,0)) calc(24px + env(safe-area-inset-left,0));-webkit-font-smoothing:antialiased}
  .wrap{max-width:340px}
  .mark{width:54px;height:54px;border-radius:15px;background:#2e4d3d;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:24px;margin:0 auto 22px}
  h1{font-size:22px;font-weight:700;letter-spacing:-.01em}
  p{font-size:14.5px;line-height:1.6;color:#565d54;margin-top:10px}
  button{margin-top:24px;background:#2e4d3d;color:#fff;border:none;border-radius:22px;padding:13px 26px;font-size:15px;font-weight:600;cursor:pointer}
  button:active{transform:scale(.98)}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#c0392b;margin-right:7px;vertical-align:1px}
  .st{margin-top:18px;font-size:12px;color:#8b9085}
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark">A</div>
    <h1>Đang mất kết nối</h1>
    <p>Không vào được mạng để cập nhật dữ liệu thị trường. Kiểm tra Wi-Fi hoặc 4G rồi thử lại nhé.</p>
    <button onclick="location.reload()">Thử lại</button>
    <div class="st"><span class="dot"></span>ADN sẽ tự mở lại khi có mạng</div>
  </div>
  <script>
    window.addEventListener('online', function(){ location.reload(); });
  </script>
</body>
</html>
