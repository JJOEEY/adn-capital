name: Deploy Web

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Build
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - name: SSH Deploy Web Only
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/adncapital/app/adn-capital
            git pull origin master
            docker compose build --no-cache web
            docker compose up -d web

      - name: Post-deploy DB checks
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/adncapital/app/adn-capital
            docker compose exec -T web env | grep DATABASE_URL | grep "@db:5432"
            docker compose exec -T db psql -U adnuser -d adncapital -c 'SELECT COUNT(*) FROM "User"'
